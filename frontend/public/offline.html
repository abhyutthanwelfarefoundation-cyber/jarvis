<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Offline</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020408;
      color: #00d4ff;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .orb {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 2px solid #00d4ff;
      box-shadow: 0 0 30px #00d4ff40, inset 0 0 30px #00d4ff10;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 30px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px #00d4ff40; }
      50% { box-shadow: 0 0 50px #00d4ff80; }
    }
    .letter { font-size: 36px; font-weight: 900; color: #fff; }
    h1 { font-size: 14px; letter-spacing: 4px; margin-bottom: 10px; }
    p { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #00d4ff60; letter-spacing: 2px; margin-bottom: 30px; }
    .status { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #ff3355; letter-spacing: 2px; padding: 8px 16px; border: 0.5px solid #ff335540; border-radius: 4px; margin-bottom: 20px; }
    button {
      padding: 12px 24px; background: rgba(0,212,255,0.1);
      border: 1px solid #00d4ff; border-radius: 6px;
      color: #00d4ff; font-family: 'Orbitron', sans-serif;
      font-size: 10px; letter-spacing: 2px; cursor: pointer;
    }
    button:hover { background: rgba(0,212,255,0.2); }
  </style>
</head>
<body>
  <div class="orb"><span class="letter">J</span></div>
  <h1>JARVIS OFFLINE</h1>
  <p>NO NETWORK CONNECTION DETECTED</p>
  <div class="status">⚡ STANDBY MODE ACTIVE</div>
  <p style="margin-bottom:20px">Connect to network to resume<br>all agent systems.</p>
  <button onclick="window.location.reload()">↺ RETRY CONNECTION</button>
</body>
</html>
