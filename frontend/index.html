<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#00d4ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JARVIS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="JARVIS" />
    <meta name="description" content="Personal AI Assistant — JARVIS, FRIDAY, HAROLD, ZEUS, STARK" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png" />

    <!-- Splash screen color -->
    <meta name="msapplication-TileColor" content="#020408" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />

    <title>JARVIS AI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[JARVIS] Service Worker registered:', reg.scope))
            .catch(err => console.log('[JARVIS] Service Worker failed:', err));
        });
      }
    </script>
  </body>
</html>
